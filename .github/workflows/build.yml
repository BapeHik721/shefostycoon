name: Build releases

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Стабильность — залог успеха
          cache: 'pip' # Ускорит повторные билды

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install pygame cryptography pyinstaller pillow
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Build Linux binary
        run: python -m PyInstaller --clean -y shefostycoon.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shefostycoon-linux
          path: dist/SHEFOS_Tycoon # Убедись, что это имя папки или файла совпадает с выхлопом PyInstaller
          if-no-files-found: error # Лучше упасть с ошибкой, чем гадать, почему пусто

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install pygame cryptography pyinstaller pillow

      - name: Build Windows executable
        run: python -m PyInstaller --clean -y shefostycoon.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shefostycoon-windows
          path: dist/SHEFOS_Tycoon.exe
          if-no-files-found: error
